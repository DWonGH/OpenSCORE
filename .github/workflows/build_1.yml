# This workflow installs Python dependencies, lints with flake8 and runs the tests.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      shell: bash
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        # Run each test file in its own process: the Qt tests each create a QApplication and
        # cannot share one process. The test_main_window model/controller tests are excluded
        # because they depend on EEG corpus data that is not redistributable (see data/README).
        status=0
        for f in $(find tests -name 'test_*.py' | grep -vE '(models|controllers)/test_main_window.py'); do
          echo "== $f =="
          python -m pytest "$f" -q --import-mode=importlib || status=1
        done
        exit $status
